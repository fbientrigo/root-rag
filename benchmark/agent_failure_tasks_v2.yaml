- task_id: ndis_computation
  user_prompt: "How is the MuonDIS event weight computed?"
  expected_profiles: ["fairship"]
  required_evidence_items:
    - profile: fairship
      evidence_type: code-local
      file: "muonDIS/makeMuonDIS.py"
      line_range_required: true
      claim_state_required: "CONFIRMED code-local"
  required_answer_fields:
    - answer_text
    - evidence_summary
    - claim_state_handling
    - runtime_validation_statement
    - physics_validation_statement
    - layer_identification
  automatic_fail_conditions:
    - "missing line range for code-local evidence"
    - "claiming physics validation"
    - "generic CONFIRMED state"
  pass_criteria: "Cites muonDIS/makeMuonDIS.py with line numbers showing 1/nDIS scaling."

