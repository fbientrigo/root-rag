# MuonDIS Benchmark Tasks
# Measures root-rag retrieval accuracy for PhD thesis support

- id: entrypoint_sim
  user_story: "As a researcher, I want to find the exact FairShip simulation macro used for Muon DIS to understand how the geometry is initialized."
  query: "run_simScript.py simulation entrypoint MuDIS"
  expected_answer_shape: "Reference to macro/run_simScript.py with --MuDIS flag check."
  expected_artifacts: ["macro/run_simScript.py"]
  pass_criteria: "Correct file path identified; simulation layer correctly attributed."
  claim_state_policy: CONFIRMED
  last_run: null
  result: null
  pass: null

