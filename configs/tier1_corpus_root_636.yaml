# ROOT 6.36.08 Tier 1 Corpus - FairShip Complete API Surface
# Expanded from seed corpus (11 classes) to full FairShip usage (88 headers)
# Last updated: 2026-03-31
# Source: artifacts/fairship_root_usage_inventory.json (272 files analyzed)

root:
  version: "6.36.08"
  tag: "v6-36-08"
  repository: "root-project/root"
  commit: null  # Resolved during indexing

