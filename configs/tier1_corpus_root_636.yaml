    # Note: Total is ~35 classes covering top headers
    # Remaining 53 headers are less frequently used utilities
    # These can be added in a Tier 1.5 expansion if needed

  # Estimated corpus size
  stats:
    estimated_classes: 35
    estimated_headers: 70
    estimated_source_files: 50
    estimated_total_lines: "~80,000-100,000"
    index_size_estimate: "30-50 MB"
    expected_chunks: "~4,000-5,000"

# Indexing strategy (same as seed)
indexing:
  extract:
    - class_definitions
    - method_signatures
    - doxygen_comments
    - inline_comments
  
  chunking:
    method: "symbol_based"
    target_chunk_size: "50-500 lines"
  
  storage:
    format: "sqlite_fts5"
    schema_version: "1.0.0"

# Validation
validation:
  golden_queries:
    # Seed corpus queries (must still pass)
    - "Where is TTree::Fill defined?"
    - "Where is TFile::Open declared?"
    - "Where is TGeoManager::SetTopVolume declared?"
    
    # New Tier 1 queries
    - "Where is TVector3::Mag implemented?"
    - "Where is TGeoBBox defined?"
    - "Where is TParticle::Energy declared?"
    - "Where is TRandom3::Gaus implemented?"
  
  acceptance:
    min_success_rate: 0.85  # 6/7 queries
    max_query_time: "2.0s"
    required_evidence: true
    version_tagging: true

# Metadata
metadata:
  schema_version: "1.0.0"
  created: "2026-03-31"
  purpose: "Tier 1 corpus covering 100% of FairShip ROOT usage"
  source_inventory: "artifacts/fairship_root_usage_inventory.json"
  fairship_coverage: "100% (88/88 headers)"
  expansion_from_seed: "seed (11 classes) → tier1 (35 classes)"
  next_tier: "Tier 2: SOFIE and rarely-used APIs"
